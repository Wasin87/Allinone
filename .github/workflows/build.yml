name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Setup Java (required for Android build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 5️⃣ Build web project
      - name: Build Web Project
        run: |
          npm run build || true
          if [ ! -d "dist" ]; then
            echo "dist not found, creating fallback"
            mkdir dist
            cp index.html dist/ || true
          fi

      # 6️⃣ Install Capacitor
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 7️⃣ Create capacitor config
      - name: Setup Capacitor Config
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec.app",
            "appName": "AllInOne",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      # 8️⃣ Add & Sync Android
      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      # 9️⃣ Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 🔍 10️⃣ Verify APK exists
      - name: Verify APK
        run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK found ✅"
          else
            echo "APK NOT FOUND ❌"
            exit 1
          fi

      # 📦 11️⃣ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
